name: Build Docker Image Only

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        run: |
          docker build -t howdo-blog:latest .

      - name: Save Docker image to tarball
        run: docker save howdo-blog:latest | gzip > howdo-blog.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: howdo-blog-image
          path: howdo-blog.tar.gz
          retention-days: 7
