# ============================================
# howdo.icu Docker Compose
# jonasal/nginx-certbot: 自动 HTTPS + 反向代理
# ============================================

services:
  web:
    image: howdo-blog:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: howdo-blog
    restart: unless-stopped
    networks:
      - howdo-net

  nginx:
    image: jonasal/nginx-certbot:latest
    container_name: howdo-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CERTBOT_EMAIL=hello@howdo.icu
      # 首次调试时设为 1，使用 Let's Encrypt 暂存环境（避免触发速率限制）
      # 证书验证通过后改回 0 或删除此行
      - STAGING=0
      # 调试模式，输出详细日志
      - DEBUG=0
    volumes:
      # 用户配置（镜像会自动 symlink 到 conf.d/）
      - ./nginx/nginx-ssl.conf:/etc/nginx/user_conf.d/default.conf:ro
      # 证书持久化
      - nginx-certs:/etc/letsencrypt
    networks:
      - howdo-net

networks:
  howdo-net:
    driver: bridge

volumes:
  nginx-certs:
