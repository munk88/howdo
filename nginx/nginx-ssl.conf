# ============================================
# howdo.icu Nginx 配置（Webhook 版）
# 增加 /webhook 反向代理到本地 webhook-server
# ============================================

# www → 裸域跳转
server {
    listen 443 ssl;
    http2 on;
    server_name www.howdo.icu;

    ssl_certificate     /etc/letsencrypt/live/howdo-icu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/howdo-icu/privkey.pem;

    return 301 https://howdo.icu$request_uri;
}

# 主站
server {
    listen 443 ssl;
    http2 on;
    server_name howdo.icu;

    ssl_certificate     /etc/letsencrypt/live/howdo-icu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/howdo-icu/privkey.pem;

    # SSL 优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Webhook 反向代理（仅 POST /webhook）
    location = /webhook {
        # 限制只接受 POST
        if ($request_method != POST) {
            return 405;
        }
        # 限制请求体大小（GitHub payload 通常 < 1MB）
        client_max_body_size 2m;
        # 反向代理到本地 webhook-server
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 超时设置（部署是异步的，webhook 本身秒回）
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    # 健康检查（可选，用于监控）
    location = /webhook/health {
        proxy_pass http://127.0.0.1:9000/health;
    }

    # 博客主站
    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/xml
        image/svg+xml;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;
}
