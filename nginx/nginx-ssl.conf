# ============================================
# howdo.icu Nginx + HTTPS 配置
# 供 jonasal/nginx-certbot 容器使用
# 该镜像会自动申请 Let's Encrypt 证书并配置 HTTPS
# ============================================

# www → 裸域跳转
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.howdo.icu;

    # SSL 配置（证书自动注入）
    ssl_certificate /etc/letsencrypt/live/howdo.icu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/howdo.icu/privkey.pem;

    return 301 https://howdo.icu$request_uri;
}

# 主站
server {
    listen 80;
    listen [::]:80;
    server_name howdo.icu;
    # jonasal/nginx-certbot 会自动添加 443 配置和证书路径

    # ACME challenge（证书申请用，该镜像会自动管理）
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # HTTP → HTTPS 跳转
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name howdo.icu;

    # SSL 配置（证书自动注入）
    ssl_certificate /etc/letsencrypt/live/howdo.icu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/howdo.icu/privkey.pem;

    # SSL 优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 反向代理到 howdo-blog 容器
    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/xml
        image/svg+xml;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 隐藏 Nginx 版本
    server_tokens off;
}
