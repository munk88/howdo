# ============================================
# howdo.icu Nginx 配置（供 jonasal/nginx-certbot 使用）
#
# 关键约定：
# 1. ssl_certificate_key 路径中的 "howdo-icu" 是 certbot 的 --cert-name
# 2. server_name 中的域名会被自动提取用于证书申请
# 3. 首次启动时镜像会自动剥离 SSL 指令、用 HTTP 申请证书、再重载
# 4. 不要手动写 ACME challenge location，镜像内置的配置会处理
# ============================================

# www → 裸域跳转
server {
    listen 443 ssl;
    http2 on;
    server_name www.howdo.icu;

    ssl_certificate     /etc/letsencrypt/live/howdo-icu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/howdo-icu/privkey.pem;

    return 301 https://howdo.icu$request_uri;
}

# 主站
server {
    listen 443 ssl;
    http2 on;
    server_name howdo.icu;

    ssl_certificate     /etc/letsencrypt/live/howdo-icu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/howdo-icu/privkey.pem;

    # SSL 优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 反向代理到 howdo-blog 容器
    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/xml
        image/svg+xml;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;
}
