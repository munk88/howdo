# ============================================
# howdo.icu Nginx 配置
# 容器内监听 80 端口，由宿主机/反向代理处理 HTTPS
# ============================================

server {
    listen 80;
    listen [::]:80;
    server_name howdo.icu www.howdo.icu;

    # 网站根目录
    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml+rss
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # www → 裸域跳转
    if ($host = www.howdo.icu) {
        return 301 https://howdo.icu$request_uri;
    }

    # 主路由
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 静态资源缓存（带 hash 的文件长期缓存）
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|webp|svg|ico|xml)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML 文件不缓存（保证内容更新即时生效）
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # RSS
    location = /rss.xml {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # 自定义 404
    error_page 404 /404.html;

    # 隐藏 Nginx 版本
    server_tokens off;
}
